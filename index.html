<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Мой дом</title>
    <link rel="stylesheet" href="./styles/main.css">
    <script src="/index.js"></script>
</head>

<body>
    <div class="container">
        <div class="my_house">
            <div class="house_bar">
                <div style="display: flex; gap: 10px;">
                    <h2 class="rost" style="font-size: 2rem">Мой дом</h2>
                    <button><img src=".\images\ChevronDown.svg" alt="#"></button>
                </div>
                <button type="button"><img src=".\images\plus.svg" alt="+"></button>
            </div>
            <div class="house_existion">
                <div class="exist_video">
                    <img src="file:///D:/hackathon/images/image.jpg" alt="#" style="border-radius: 22px;">
                    <h2 class="place rost">Прихожая</h2>
                    <h2 class="video rost">Прямой эфир <img src=".\images\live.svg" alt="( * )"></h2>
                </div>
                <div class="exist_info">
                    <div class="scroll_bar">
                        <div class="card-info" style="background: #EEEEEE;">
                            <img src=".\images\temperature.svg" alt="#">
                            <p class="rost" style="color: black;">20°C / 52%</p>
                        </div>
                        <div class="card-info" style="background: red;">
                            <img src=".\images\lock.svg" alt="#">
                            <p class="rost">Дверь закрыта</p>
                        </div>
                        <div class="card-info" style="background: #0ACB5B;">
                            <img src=".\images\icon.svg" alt="#">
                            <p class="rost">Работают</p>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <p class="rost" style="margin: 0;">Общее состояние</p>
                        <div class="card-info" style="background: #FED388;">
                            <img src=".\images\emoji.svg" alt="#">
                            <p class="rost" style="color: black;">Хорошо</p>
                        </div>
                    </div>
                </div>
            </div>
            <button class="btn1"><span></span></button>
        </div>
        <div class="main">
            <div class="all_devices">
                <div class="devices_bar">
                    <div style="display: flex; gap: 10px;">
                        <h2 class="rost" style="margin: 0;">Все устройства</h2>
                        <button><img src=".\images\ChevronDown.svg" alt="#"></button>
                    </div>
                    <p class="rost" style="margin: 0;">10 устройств</p>
                </div>
                <div class="potoky">
                    <div class="cards">
                        <div class="sostoit">
                            <img src=".\images\Vector.svg" alt="#">
                            <h2 class="sost rost">Открыт</h2>
                        </div>
                        <h2 class="name rost">Дверь</h2>
                    </div>
                    <div class="cards">
                        <div class="sostoit">
                            <img src=".\images\Vector (1).svg" alt="#">
                            <h2 class="sost rost"></h2>
                        </div>
                        <h2 class="name rost">Датчик воздуха</h2>
                    </div>
                    <div class="cards">
                        <div class="sostoit">
                            <img src=".\images\Frame 17.svg" alt="#" style="background-color: #abaeb4;">
                            <h2 class="sost rost">Выкл.</h2>
                        </div>
                        <h2 class="name rost">Подсветка</h2>
                    </div>
                    <div class="cards">
                        <div class="sostoit">
                            <img src=".\images\svg-path-6 1.svg" alt="">
                            <h2 class="sost rost"></h2>
                            <h2 class="sost rost"></h2>
                        </div>
                        <h2 class="name rost">Лампа</h2>
                    </div>
                    <div class="cards">
                        <div class="sostoit">
                            <img src=".\images\svg-path-6 1 (1).svg" alt=""
                                style="background-color: #abaeb4;">
                            <h2 class="sost rost">Выкл.</h2>
                        </div>
                        <h2 class="name rost">Светильник</h2>
                    </div>
                    <div class="cards">
                        <div class="sostoit">
                            <img src=".\images\svg-path-6 1 (2).svg" alt="">
                            <h2 class="sost rost">Вкл.</h2>
                        </div>
                        <h2 class="name rost">Туалет</h2>
                    </div>
                    <div class="cards">
                        <div class="sostoit">
                            <img src=".\images\Vector (2).svg" alt="" style="background-color: #FDA610;">
                            <h2 class="sost rost"><img src=".\images\svg-path-7 1.svg" alt=""
                                    style="background-color: transparent; width: auto;"></h2>
                        </div>
                        <h2 class="name rost">Датчик воды</h2>
                    </div>
                    <div class="cards">
                        <div class="sostoit">
                            <img src=".\images\svg-path-6 1 (3).svg" alt="">
                            <h2 class="sost rost">Вкл.</h2>
                        </div>
                        <h2 class="name rost">Торшер</h2>
                    </div>
                    <div class="cards">
                        <div class="sostoit">
                            <img src=".\images\Vector (3).svg" alt="" style="background-color: #abaeb4;">
                            <h2 class="sost rost"><img src=".\images\svg-path-7 1.svg" alt=""
                                    style="background-color: transparent; width: auto;"></h2>
                        </div>
                        <h2 class="name rost">Розетка</h2>
                    </div>
                    <div class="cards">
                        <div class="sostoit">
                            <img src=".\images\svg-path-21 1.svg" alt="">
                            <h2 class="sost rost" style="color: #0ACB5B;">OK</h2>
                        </div>
                        <h2 class="name rost">Камера</h2>
                    </div>
                </div>
            </div>
        </div>
        <div class="menu">
            <nav class="nav_bar">
                <button class="btn_home">
                    <img src=".\images\home.svg" alt="#" class="image">
                    <a class="name rost active" href="#">Главная</a>
                </button>
                <button class="btn_home" href="">
                    <img src=".\images\scene.svg" alt="#" class="image">
                    <a class="name rost" href=".\scene.html">Сценарии</a>
                </button>
                <button class="btn_home">
                    <img src=".\images\more.svg" alt="#" class="image">
                    <a class="name rost" href=".\more.html">Ещё</a>
                </button>
            </nav>
        </div>
    </div>
</body>

</html>
